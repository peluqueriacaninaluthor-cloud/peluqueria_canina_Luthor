<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sistema de Gestión Empresarial Peluquería Canina Luthor" />
  <title>Luthor · Sistema Empresarial</title>
  <!-- ✅ CSS Optimizado -->
  <link rel="icon" type="image/svg+xml" href="logo.svg" />
  <!-- ✅ CDNs con versiones fijas -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
  </script>
  <!-- ✅ Estilos optimizados -->
  <style>
    /* ============================
       VARIABLES DE DISEÑO EMPRESARIAL
       ============================ */
    :root {
      --primary: #b8712a;
      --primary-dark: #8a551f;
      --primary-light: #e8c48a;
      --primary-gradient: linear-gradient(135deg, #8a551f 0%, #b8712a 50%, #d4903f 100%);
      --bg-primary: #fcf8f0;
      --bg-secondary: #fff8ec;
      --bg-white: #ffffff;
      --bg-dark: #1a0f05;
      --text-primary: #2c1a0a;
      --text-secondary: #7a6548;
      --text-white: #ffffff;
      --success: #2d7d46;
      --error: #b23b2a;
      --warning: #f5a623;
      --info: #2a6d8c;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
      --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.12);
      --shadow-xl: 0 20px 60px rgba(0, 0, 0, 0.15);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 20px;
      --radius-xl: 28px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* ============================
       RESET Y BASE
       ============================ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }

    body {
      font-family: var(--font-family);
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    img {
      max-width: 100%;
      display: block;
    }
    a {
      text-decoration: none;
      color: inherit;
    }
    button {
      cursor: pointer;
      font-family: inherit;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ============================
       SCROLLBAR PERSONALIZADA
       ============================ */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-primary);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--primary-light);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--primary);
    }

    /* ============================
       LOADING SKELETON
       ============================ */
    .skeleton {
      animation: shimmer 1.5s ease-in-out infinite;
      background: linear-gradient(90deg, #f0ece4 25%, #e8e0d4 50%, #f0ece4 75%);
      background-size: 200% 100%;
      border-radius: var(--radius-sm);
    }
    @keyframes shimmer {
      0% {
        background-position: -200% 0;
      }
      100% {
        background-position: 200% 0;
      }
    }

    /* ============================
       TOAST MODERNO
       ============================ */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 400px;
      width: 100%;
      pointer-events: none;
    }

    .toast {
      background: var(--bg-white);
      padding: 16px 20px;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-xl);
      display: flex;
      align-items: center;
      gap: 14px;
      pointer-events: auto;
      animation: slideInRight 0.4s ease;
      border-left: 5px solid var(--primary);
      font-size: 0.92rem;
      color: var(--text-primary);
    }
    .toast.success {
      border-left-color: var(--success);
    }
    .toast.error {
      border-left-color: var(--error);
    }
    .toast.warning {
      border-left-color: var(--warning);
    }
    .toast.info {
      border-left-color: var(--info);
    }
    .toast i {
      font-size: 1.3rem;
      flex-shrink: 0;
    }
    .toast .toast-close {
      margin-left: auto;
      background: none;
      border: none;
      font-size: 1.1rem;
      color: var(--text-secondary);
      padding: 0 4px;
      cursor: pointer;
      transition: var(--transition);
    }
    .toast .toast-close:hover {
      color: var(--text-primary);
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(40px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    /* ============================
       AUTH PAGE - MODERNA
       ============================ */
    #authPage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--primary-gradient);
      position: relative;
      overflow: hidden;
      padding: 20px;
    }
    #authPage::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.05) 0%, transparent 60%),
        radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.03) 0%, transparent 50%);
      pointer-events: none;
    }

    .auth-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      width: 100%;
      max-width: 460px;
      position: relative;
      z-index: 1;
    }

    .auth-brand {
      text-align: center;
      color: var(--text-white);
    }
    .auth-brand .icon {
      font-size: 4.5rem;
      display: block;
      margin-bottom: 8px;
      animation: float 3s ease-in-out infinite;
    }
    .auth-brand h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .auth-brand p {
      opacity: 0.8;
      font-size: 0.95rem;
      margin-top: 4px;
    }

    @keyframes float {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    .auth-card {
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      padding: 36px 32px;
      width: 100%;
      box-shadow: var(--shadow-xl);
    }

    .auth-tabs {
      display: flex;
      gap: 4px;
      background: var(--bg-primary);
      border-radius: 50px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .auth-tab {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 50px;
      background: none;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-secondary);
      transition: var(--transition);
      cursor: pointer;
    }
    .auth-tab.active {
      background: var(--bg-white);
      color: var(--primary);
      box-shadow: var(--shadow-sm);
    }
    .auth-tab:hover:not(.active) {
      color: var(--text-primary);
    }

    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e8e0d8;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-family: inherit;
      transition: var(--transition);
      background: var(--bg-white);
      color: var(--text-primary);
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(184, 113, 42, 0.1);
    }
    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 28px;
      border: none;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.95rem;
      transition: var(--transition);
      cursor: pointer;
      font-family: inherit;
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .btn-block {
      width: 100%;
    }
    .btn-primary {
      background: var(--primary);
      color: var(--text-white);
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(184, 113, 42, 0.3);
    }
    .btn-success {
      background: var(--success);
      color: var(--text-white);
    }
    .btn-success:hover:not(:disabled) {
      background: #1f5e34;
      transform: translateY(-2px);
    }
    .btn-danger {
      background: var(--error);
      color: var(--text-white);
    }
    .btn-danger:hover:not(:disabled) {
      background: #8f2a1a;
      transform: translateY(-2px);
    }
    .btn-outline {
      background: transparent;
      border: 2px solid var(--primary);
      color: var(--primary);
    }
    .btn-outline:hover:not(:disabled) {
      background: var(--primary);
      color: var(--text-white);
      transform: translateY(-2px);
    }
    .btn-ghost {
      background: var(--bg-primary);
      color: var(--text-secondary);
    }
    .btn-ghost:hover:not(:disabled) {
      background: #e8e0d4;
      transform: translateY(-2px);
    }
    .btn-sm {
      padding: 6px 16px;
      font-size: 0.8rem;
    }

    .link-forgot {
      display: block;
      text-align: right;
      margin-top: 12px;
      color: var(--primary);
      font-size: 0.85rem;
      cursor: pointer;
    }
    .link-forgot:hover {
      text-decoration: underline;
    }

    .alert {
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      margin-top: 12px;
    }
    .alert-error {
      background: #fdf0ee;
      color: var(--error);
      border: 1px solid #f5c6c1;
    }
    .alert-success {
      background: #edf7ed;
      color: var(--success);
      border: 1px solid #b7dbb7;
    }

    .hidden {
      display: none !important;
    }

    /* ============================
       TOPBAR EMPRESARIAL
       ============================ */
    .topbar {
      background: var(--bg-white);
      border-bottom: 1px solid #e8e0d8;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(20px);
      background: rgba(255, 255, 255, 0.95);
    }
    .topbar-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .topbar-brand .logo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--primary-gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-white);
      font-size: 1.2rem;
    }
    .topbar-brand h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    .topbar-brand span {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }
    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* ============================
       TABS
       ============================ */
    .tab-nav {
      background: var(--bg-white);
      border-bottom: 1px solid #e8e0d8;
      overflow-x: auto;
      padding: 0 16px;
      scrollbar-width: none;
    }
    .tab-nav::-webkit-scrollbar {
      display: none;
    }
    .tab-nav-inner {
      display: flex;
      gap: 4px;
      min-width: max-content;
      padding: 8px 0;
    }
    .tab-btn {
      padding: 8px 20px;
      border: none;
      border-radius: 50px;
      background: none;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text-secondary);
      transition: var(--transition);
      cursor: pointer;
      white-space: nowrap;
    }
    .tab-btn:hover {
      color: var(--text-primary);
      background: var(--bg-primary);
    }
    .tab-btn.active {
      background: var(--primary);
      color: var(--text-white);
      box-shadow: 0 4px 12px rgba(184, 113, 42, 0.3);
    }

    /* ============================
       MAIN CONTENT
       ============================ */
    .main {
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      flex: 1;
    }
    .panel {
      display: none;
    }
    .panel.active {
      display: block;
    }

    /* ============================
       CARDS EMPRESARIALES
       ============================ */
    .card {
      background: var(--bg-white);
      border-radius: var(--radius-md);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      border: 1px solid #f0ece4;
      margin-bottom: 20px;
      transition: var(--transition);
    }
    .card:hover {
      box-shadow: var(--shadow-md);
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-title i {
      color: var(--primary);
    }

    /* ============================
       GRIDS EMPRESARIALES
       ============================ */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    /* ============================
       STAT CARDS
       ============================ */
    .stat-card {
      background: var(--bg-white);
      border-radius: var(--radius-md);
      padding: 20px;
      text-align: center;
      border: 1px solid #f0ece4;
      transition: var(--transition);
    }
    .stat-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
    }
    .stat-label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    .stat-icon {
      font-size: 2rem;
      color: var(--primary-light);
      margin-bottom: 8px;
    }

    /* ============================
       TABLAS
       ============================ */
    .table-wrap {
      overflow-x: auto;
    }
    .table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    .table th {
      text-align: left;
      padding: 12px 16px;
      background: var(--bg-primary);
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .table td {
      padding: 12px 16px;
      border-bottom: 1px solid #f0ece4;
    }
    .table tr:hover td {
      background: var(--bg-primary);
    }

    /* ============================
       BADGES
       ============================ */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 12px;
      border-radius: 50px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-pending {
      background: #fef3e0;
      color: var(--warning);
    }
    .badge-success {
      background: #edf7ed;
      color: var(--success);
    }
    .badge-danger {
      background: #fdf0ee;
      color: var(--error);
    }
    .badge-info {
      background: #e8f0fe;
      color: var(--info);
    }
    .badge-admin {
      background: #e8e0ff;
      color: #4a2b7a;
    }

    /* ============================
       MODAL EMPRESARIAL
       ============================ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
      animation: fadeIn 0.3s ease;
    }
    .modal-overlay.hidden {
      display: none !important;
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }
    .modal-box {
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      padding: 32px;
      max-width: 560px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-xl);
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    .modal-box.wide {
      max-width: 720px;
    }
    .modal-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .modal-title i {
      color: var(--primary);
    }
    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    /* ============================
       FOOTER EMPRESARIAL
       ============================ */
    .app-footer {
      background: var(--bg-white);
      border-top: 1px solid #e8e0d8;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    .footer-copy {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    .footer-links {
      display: flex;
      gap: 12px;
    }
    .footer-links button {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 0.8rem;
      transition: var(--transition);
      cursor: pointer;
    }
    .footer-links button:hover {
      color: var(--primary);
    }

    /* ============================
       RESPONSIVE
       ============================ */
    @media (max-width: 1024px) {
      .grid-4 {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (max-width: 768px) {
      .grid-2,
      .grid-3,
      .grid-4 {
        grid-template-columns: 1fr;
      }
      .auth-card {
        padding: 24px 20px;
      }
      .topbar-inner {
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
      }
      .topbar-actions {
        justify-content: space-between;
      }
      .main {
        padding: 16px;
      }
      .modal-box {
        padding: 24px 20px;
      }
      .stat-value {
        font-size: 1.5rem;
      }
    }
    @media (max-width: 480px) {
      .auth-brand h1 {
        font-size: 1.5rem;
      }
      .btn {
        font-size: 0.85rem;
        padding: 10px 20px;
      }
      .toast {
        font-size: 0.85rem;
        padding: 12px 16px;
      }
    }

    /* ============================
       UTILIDADES
       ============================ */
    .mt-1 {
      margin-top: 8px;
    }
    .mt-2 {
      margin-top: 16px;
    }
    .mt-3 {
      margin-top: 24px;
    }
    .mb-1 {
      margin-bottom: 8px;
    }
    .mb-2 {
      margin-bottom: 16px;
    }
    .text-center {
      text-align: center;
    }
    .text-muted {
      color: var(--text-secondary);
      font-size: 0.85rem;
    }
    .flex {
      display: flex;
    }
    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .gap-1 {
      gap: 8px;
    }
    .gap-2 {
      gap: 16px;
    }
    .w-full {
      width: 100%;
    }
  </style>
</head>
<body>

  <!-- ============================
  TOAST CONTAINER
  ============================ -->
  <div id="toast-container" role="status" aria-live="polite"></div>

  <!-- ============================
  AUTH PAGE
  ============================ -->
  <div id="authPage" class="page">
    <div class="auth-container">
      <div class="auth-brand">
        <span class="icon">🐩</span>
        <h1>Luthor</h1>
        <p>Peluquería Canina · Estilo y Cuidado</p>
      </div>
      <div class="auth-card">
        <div class="auth-tabs" role="tablist">
          <button class="auth-tab active" id="tabLoginBtn" role="tab">Iniciar Sesión</button>
          <button class="auth-tab" id="tabRegisterBtn" role="tab">Registrarse</button>
        </div>
        <div id="loginPanel">
          <div class="form-group">
            <label for="loginEmail">Correo electrónico</label>
            <input type="email" id="loginEmail" placeholder="correo@ejemplo.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="loginPass">Contraseña</label>
            <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" />

      _log(level, message, data = null) {
        const timestamp = new Date().toISOString();
        const prefix = `[${timestamp}] ${level}`;
        if (data) {
          console.log(prefix, message, data);
        } else {
          console.log(prefix, message);
        }
        if (window._luthor_logs) {
          window._luthor_logs.push({ level, message, data, timestamp });
        }
      },

      info(msg, data) { this._log(this.levels.INFO, msg, data); },
      success(msg, data) { this._log(this.levels.SUCCESS, msg, data); },
      warn(msg, data) { this._log(this.levels.WARNING, msg, data); },
      error(msg, data) { this._log(this.levels.ERROR, msg, data); },
      // ✅ CORREGIDO: usa CONFIG.IS_DEBUG en lugar de process.env
      debug(msg, data) {

    const Cache = {

        const expires = Date.now() + ttl;
        this._store.set(key, { value, expires });
        Logger.debug(`Cache set: ${key}`, { ttl });
      },

      get(key) {
        const item = this._store.get(key);
        if (!item) return null;
        if (Date.now() > item.expires) {
          this._store.delete(key);
          Logger.debug(`Cache expired: ${key}`);
          return null;
        }
        Logger.debug(`Cache hit: ${key}`);
        return item.value;
      },

      invalidate(key) {
        this._store.delete(key);
        Logger.debug(`Cache invalidated: ${key}`);
      },

      clear() {
        this._store.clear();
        Logger.info('Cache cleared');
      },

      invalidatePattern(prefix) {
        for (const key of this._store.keys()) {
          if (key.startsWith(prefix)) {
            this._store.delete(key);
          }
        }
        Logger.debug(`Cache invalidated pattern: ${prefix}*`);

          options: { data: { nombre: userData.nombre } },

        const { error: profileError } = await supabaseClient

        citas: [],
        mascotas: [],
        pagos: [],
        gastos: [],
        fotos: [],
        productos: [],
        usuarios: [],
        loading: false,
        initialized: false,
      },
      _listeners: [],

      get(key) {
        return this._data[key];
      },

      set(key, value) {
        this._data[key] = value;
        this._notifyListeners(key, value);
      },

      update(updates) {
        Object.assign(this._data, updates);
        this._notifyListeners('*', this._data);
      },

      subscribe(fn) {
        this._listeners.push(fn);
        return () => {
          this._listeners = this._listeners.filter(f => f !== fn);
        };
      },

      _notifyListeners(key, value) {
        for (const fn of this._listeners) {
          try {
            fn(key, value, this._data);
          } catch (e) {
            Logger.error('State listener error', e);
          }
        }
      },
    };

    // ================================================================
    // 6. UI HELPERS
    // ================================================================

    // --- Toast ---
    function showToast(message, type = 'info', duration = CONFIG.TOAST_DURATION) {
      const container = document.getElementById('toast-container');
      if (!container) return;

      const icons = {
        success: 'fa-check-circle',
        error: 'fa-exclamation-circle',
        warning: 'fa-exclamation-triangle',
        info: 'fa-info-circle',
      };

      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `
        <i class="fas ${icons[type] || icons.info}"></i>
        <span>${message}</span>
        <button class="toast-close" aria-label="Cerrar">&times;</button>
      `;

      container.appendChild(toast);

      const closeBtn = toast.querySelector('.toast-close');
      closeBtn.addEventListener('click', () => {
        toast.remove();
      });

      setTimeout(() => {
        if (toast.parentNode) toast.remove();
      }, duration);

      Logger.info(`Toast: ${type} - ${message}`);
    }

    // --- Modal helpers ---
    function openModal(id) {
      const el = document.getElementById(id);
      if (el) el.classList.remove('hidden');
    }

    function closeModal(id) {
      const el = document.getElementById(id);
      if (el) el.classList.add('hidden');
    }

    // --- Form helpers ---
    function getFormValue(id) {
      const el = document.getElementById(id);
      return el ? el.value.trim() : '';
    }

    function setFormValue(id, value) {
      const el = document.getElementById(id);
      if (el) el.value = value;
    }

    function setLoading(btnId, loading = true, text = 'Cargando...') {
      const btn = document.getElementById(btnId);
      if (!btn) return;
      if (loading) {
        btn.disabled = true;
        btn._originalText = btn.innerHTML;
        btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> ${text}`;
      } else {
        btn.disabled = false;
        btn.innerHTML = btn._originalText || btn.innerHTML;
      }
    }

    // --- Render helpers ---
    function formatCurrency(amount) {
      return '$' + Number(amount).toLocaleString('es-CO');
    }

    function formatDate(dateStr) {
      try {
        const d = new Date(dateStr);
        return d.toLocaleDateString('es-CO', {
          day: '2-digit',
          month: 'short',
          year: 'numeric',
          hour: '2-digit',
          minute: '2-digit',
        });
      } catch {
        return String(dateStr);
      }
    }

    function formatDateShort(dateStr) {
      try {
        const d = new Date(dateStr);
        return d.toLocaleDateString('es-CO', {
          day: '2-digit',
          month: 'short',
          year: 'numeric',
        });
      } catch {
        return String(dateStr);
      }
    }

    function escHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    // ================================================================
    // 7. MÓDULO DE AUTENTICACIÓN
    // ================================================================

    const AuthModule = {
      async init() {
        Logger.info('AuthModule init');

        try {
          const session = await Services.getSession();
          if (session) {
            Logger.info('Session found', { userId: session.user.id });
            await this._handleAuthenticated(session.user);
            return true;
          }
        } catch (error) {
          Logger.error('Session check error', error);
        }

        this._showAuthPage();
        return false;
      },

      async _handleAuthenticated(user) {
        try {
          const profile = await Services.getUserProfile(user.id);

          State.update({
            userId: user.id,
            profile: profile,
            esAdmin: profile?.es_admin || false,
            nombre: profile?.nombre || user.email?.split('@')[0] || 'Usuario',
            email: user.email || '',
            telefono: profile?.telefono || '',
          });

          if (State.get('esAdmin')) {
            await this._loadAdminData();
            this._showAdminPage();
          } else {
            await this._loadClientData(user.id);
            this._showClientPage();
          }

          Logger.success('User authenticated', { userId: user.id, esAdmin: State.get('esAdmin') });
          return true;
        } catch (error) {
          Logger.error('Auth handler error', error);
          showToast('Error al cargar perfil: ' + error.message, 'error');
          await Services.logout();
          this._showAuthPage();
          return false;
        }
      },

      async _loadAdminData() {
        Logger.info('Loading admin data');
        State.set('loading', true);
        try {
          const [citas, pagos, gastos, fotos, productos, usuarios] = await Promise.all([
            Services.getAllCitas(),
            Services.getPagos(),
            Services.getGastos(),
            Services.getFotos(),
            Services.getProductos(),
            Services.getAllUsers(),
          ]);
          State.update({ citas, pagos, gastos, fotos, productos, usuarios });
        } catch (error) {
          Logger.error('Admin data load error', error);
          showToast('Error al cargar datos: ' + error.message, 'error');
        } finally {
          State.set('loading', false);
        }
      },

      async _loadClientData(userId) {
        Logger.info('Loading client data');
        State.set('loading', true);
        try {
          const [citas, mascotas] = await Promise.all([
            Services.getCitas(userId),
            Services.getMascotas(userId),
          ]);
          State.update({ citas, mascotas });
        } catch (error) {
          Logger.error('Client data load error', error);
          showToast('Error al cargar datos: ' + error.message, 'error');
        } finally {
          State.set('loading', false);
        }
      },

      _showAuthPage() {
        document.getElementById('authPage').style.display = '';
        document.getElementById('clientPage').classList.remove('active');
        document.getElementById('adminPage').classList.remove('active');
        this._initAuthPageUI();
      },

      _showClientPage() {
        document.getElementById('authPage').style.display = 'none';
        document.getElementById('clientPage').classList.add('active');
        document.getElementById('adminPage').classList.remove('active');
        ClientModule.init();
      },

      _showAdminPage() {
        document.getElementById('authPage').style.display = 'none';
        document.getElementById('clientPage').classList.remove('active');
        document.getElementById('adminPage').classList.add('active');
        AdminModule.init();
      },

      _initAuthPageUI() {
        const tabs = document.querySelectorAll('.auth-tab');
        const loginPanel = document.getElementById('loginPanel');
        const registerPanel = document.getElementById('registerPanel');

        document.getElementById('tabLoginBtn').onclick = () => {
          tabs.forEach(t => t.classList.remove('active'));
          document.getElementById('tabLoginBtn').classList.add('active');
          loginPanel.classList.remove('hidden');
          registerPanel.classList.add('hidden');
        };

        document.getElementById('tabRegisterBtn').onclick = () => {
          tabs.forEach(t => t.classList.remove('active'));
          document.getElementById('tabRegisterBtn').classList.add('active');
          registerPanel.classList.remove('hidden');
          loginPanel.classList.add('hidden');
        };

        document.getElementById('loginBtn').onclick = async () => {
          const email = getFormValue('loginEmail');
          const pass = getFormValue('loginPass');
          if (!email || !pass) {
            showToast('Ingresa correo y contraseña', 'error');
            return;
          }
          setLoading('loginBtn', true, 'Ingresando...');
          try {
            await Services.login(email, pass);
            location.reload();
          } catch (error) {
            showToast(error.message, 'error');
            setLoading('loginBtn', false);
          }
        };

        document.getElementById('registerBtn').onclick = async () => {
          const nombre = getFormValue('regNombre');
          const telefono = getFormValue('regTelefono');
          const email = getFormValue('regEmail');
          const pass = getFormValue('regPassword');

          if (!nombre || !email || !pass) {
            showToast('Nombre, correo y contraseña son obligatorios', 'error');
            return;
          }
          if (pass.length < 6) {
            showToast('La contraseña debe tener al menos 6 caracteres', 'error');
            return;
          }

          setLoading('registerBtn', true, 'Registrando...');
          try {
            await Services.register(email, pass, { nombre, telefono });
            showToast('Cuenta creada. Por favor inicia sesión.', 'success');
            document.getElementById('tabLoginBtn').click();
            setFormValue('loginEmail', email);
            setFormValue('loginPass', '');
          } catch (error) {
            showToast(error.message, 'error');
          } finally {
            setLoading('registerBtn', false);
          }
        };

        document.getElementById('forgotPasswordLink').onclick = () => {
          openModal('forgotModal');
        };

        document.getElementById('sendResetBtn').onclick = async () => {
          const email = getFormValue('resetEmail');
          if (!email) {
            showToast('Ingresa tu correo', 'error');
            return;
          }
          setLoading('sendResetBtn', true, 'Enviando...');
          try {
            await Services.resetPassword(email);
            showToast('Instrucciones enviadas a tu correo', 'success');
            closeModal('forgotModal');
          } catch (error) {
            showToast(error.message, 'error');
          } finally {
            setLoading('sendResetBtn', false);
          }
        };

        document.getElementById('closeForgotBtn').onclick = () => closeModal('forgotModal');

        document.getElementById('loginPass').addEventListener('keydown', e => {
          if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
        document.getElementById('regPassword').addEventListener('keydown', e => {
          if (e.key === 'Enter') document.getElementById('registerBtn').click();
        });

        renderFooter('footerAuth');
      },
    };

    // ================================================================
    // 8. MÓDULO DE CLIENTES (CORREGIDO)
    // ================================================================

    const ClientModule = {
      init() {
        Logger.info('ClientModule init');
        const nombre = State.get('nombre');
        document.getElementById('clientWelcome').textContent = `Hola, ${nombre}`;
        document.getElementById('clientLogout').onclick = this._handleLogout;

        this._initTabs();
        this._renderTabs();
        this._initModals();
        renderFooter('footerClient');
      },

      _handleLogout() {
        Services.logout();
        location.reload();
      },

      _initTabs() {
        const nav = document.getElementById('clientTabNav');
        const main = document.getElementById('clientMain');
        const tabs = [
          { id: 'agendar', label: '📅 Agendar cita' },
          { id: 'mis_citas', label: '📋 Mis citas' },
          { id: 'mis_mascotas', label: '🐾 Mis mascotas' },
          { id: 'galeria', label: '📸 Galería' },
        ];

        nav.innerHTML = tabs.map((t, i) =>
          `<button class="tab-btn${i === 0 ? ' active' : ''}" data-ctab="${t.id}">${t.label}</button>`
        ).join('');

        main.innerHTML = tabs.map((t, i) =>
          `<div id="ctab-${t.id}" class="panel${i === 0 ? ' active' : ''}"></div>`
        ).join('');

        nav.querySelectorAll('[data-ctab]').forEach(btn => {
          btn.onclick = () => {
            nav.querySelectorAll('[data-ctab]').forEach(b => b.classList.remove('active'));
            main.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(`ctab-${btn.dataset.ctab}`).classList.add('active');
            this._renderTab(btn.dataset.ctab);
          };
        });
      },

      _renderTabs() {
        ['agendar', 'mis_citas', 'mis_mascotas', 'galeria'].forEach(tab => this._renderTab(tab));
      },

      _renderTab(tab) {
        const cont = document.getElementById(`ctab-${tab}`);
        if (!cont) return;
        switch (tab) {
          case 'agendar':
            this._renderBooking(cont);
            break;
          case 'mis_citas':
            this._renderCitas(cont);
            break;
          case 'mis_mascotas':
            this._renderMascotas(cont);
            break;
          case 'galeria':
            this._renderGaleria(cont);
            break;
        }
      },

      _renderBooking(cont) {
        const mascotas = State.get('mascotas') || [];
        cont.innerHTML = `
          <div class="promo-banner" style="background:linear-gradient(95deg,#fff4d6,#ffeab5);padding:12px 20px;border-radius:8px;display:flex;align-items:center;gap:10px;margin-bottom:20px;">
            <i class="fas fa-paw" style="color:var(--primary);font-size:1.2rem;"></i>
            <span style="font-weight:600;">¡Agenda la cita de tu peludo! Recuerda traer su carnet de vacunación.</span>
          </div>
          <div class="grid-2">
            <div class="card">
              <div class="card-title"><i class="fas fa-dog"></i> Selecciona tu mascota</div>
              <div class="form-group">
                <label for="clientPetSelect">Mascota</label>
                <select id="clientPetSelect">
                  <option value="">-- Elige una mascota --</option>
                  ${mascotas.map(m => `<option value="${m.id}" data-raza="${escHtml(m.raza || '')}">${escHtml(m.nombre)} (${escHtml(m.raza || 'sin raza')})</option>`).join('')}
                </select>
              </div>
              <div class="form-group">
                <label for="clientServiceSelect">Servicio</label>
                <select id="clientServiceSelect">
                  <option value="baño">Baño básico</option>
                  <option value="corte">Corte estilizado</option>
                  <option value="baño_corte">Baño + Corte</option>
                  <option value="spa">Spa completo</option>
                  <option value="uñas">Corte de uñas</option>
                  <option value="oidos">Limpieza de oídos</option>
                  <option value="cepillado">Cepillado / Deslanado</option>
                  <option value="glandulas">Glándulas anales</option>
                </select>
              </div>
              <div class="grid-2" style="gap:12px;">
                <div class="form-group">
                  <label for="clientBookingDate">Fecha</label>
                  <input type="date" id="clientBookingDate" />
                </div>
                <div class="form-group">
                  <label for="clientBookingTime">Hora</label>
                  <select id="clientBookingTime">
                    <option value="08:00">8:00 AM</option>
                    <option value="10:00">10:00 AM</option>
                    <option value="12:00">12:00 PM</option>
                    <option value="14:00">2:00 PM</option>
                    <option value="16:00">4:00 PM</option>
                  </select>
                </div>
              </div>
              <div class="form-group">
                <label for="clientBookingNotes">Notas adicionales</label>
                <textarea id="clientBookingNotes" rows="2" placeholder="Ej: perro nervioso, dejar bigote largo..."></textarea>
              </div>
              <div style="margin-top:8px;font-size:0.9rem;color:var(--text-secondary);">
                Precio estimado: <strong id="clientPrecioEstimado" style="color:var(--primary);">-</strong>
              </div>
              <button class="btn btn-primary btn-block mt-2" id="clientBookBtn"><i class="fas fa-calendar-check"></i> Agendar cita</button>
              <div id="clientBookMsg" class="mt-1"></div>
            </div>
            <div class="card">
              <div class="card-title"><i class="fas fa-tag"></i> Precios de referencia</div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:0.9rem;">
                <div><strong>Pinscher</strong></div><div style="text-align:right;">$25.000</div>
                <div><strong>Perros pequeños</strong></div><div style="text-align:right;">$40.000</div>
                <div><strong>Perros medianos</strong></div><div style="text-align:right;">$50.000 - $70.000</div>
                <div><strong>Perros grandes</strong></div><div style="text-align:right;">$70.000 - $100.000</div>
                <div><strong>Perros extra grandes</strong></div><div style="text-align:right;">$100.000 - $150.000</div>
              </div>
              <div style="margin-top:12px;font-size:0.85rem;color:var(--text-secondary);font-style:italic;">* El precio final depende del estado del manto y el tamaño.</div>
            </div>
          </div>
        `;

        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        document.getElementById('clientBookingDate').value = tomorrow.toISOString().split('T')[0];

        const updatePrecio = () => {
          const select = document.getElementById('clientPetSelect');
          const option = select.options[select.selectedIndex];
          const raza = option ? option.dataset.raza : '';
          const servicio = document.getElementById('clientServiceSelect').value;
          const precios = { baño: 25000, corte: 35000, baño_corte: 50000, spa: 80000, uñas: 15000, oidos: 15000,
            cepillado: 20000, glandulas: 10000 };
          const ajustes = { Pinscher: 0, Pequeño: 5000, Mediano: 10000, Grande: 20000, ExtraGrande: 35000 };
          const base = precios[servicio] || 40000;
          const ajuste = ajustes[raza] || 0;
          document.getElementById('clientPrecioEstimado').textContent = formatCurrency(base + ajuste);
        };

        document.getElementById('clientPetSelect').onchange = updatePrecio;
        document.getElementById('clientServiceSelect').onchange = updatePrecio;
        setTimeout(updatePrecio, 100);

        document.getElementById('clientBookBtn').onclick = async () => {
          const mascotaId = getFormValue('clientPetSelect');
          const servicio = getFormValue('clientServiceSelect');
          const fecha = getFormValue('clientBookingDate');
          const hora = getFormValue('clientBookingTime');
          const notas = getFormValue('clientBookingNotes');

          if (!mascotaId) { showToast('Selecciona una mascota', 'error'); return; }
          if (!fecha) { showToast('Selecciona una fecha', 'error'); return; }

          setLoading('clientBookBtn', true, 'Agendando...');
          try {
            const allCitas = await Services.getAllCitas();
            const target = new Date(`${fecha}T${hora}:00`).getTime();
            const ocupado = allCitas.some(c => {
              if (!c.fecha_hora || c.estado === 'Cancelada') return false;
              return new Date(c.fecha_hora).getTime() === target;
            });
            if (ocupado) {
              showToast('Ya hay una cita agendada para esa fecha y hora', 'error');
              return;
            }

            const fechaHora = new Date(`${fecha}T${hora}:00`).toISOString();
            const invoice = 'LUT-' + Date.now().toString(36).toUpperCase();
            const select = document.getElementById('clientPetSelect');
            const option = select.options[select.selectedIndex];
            const raza = option ? option.dataset.raza : '';
            const precios = { baño: 25000, corte: 35000, baño_corte: 50000, spa: 80000, uñas: 15000, oidos: 15000,
              cepillado: 20000, glandulas: 10000 };
            const ajustes = { Pinscher: 0, Pequeño: 5000, Mediano: 10000, Grande: 20000, ExtraGrande: 35000 };
            const precio = (precios[servicio] || 40000) + (ajustes[raza] || 0);

            await Services.createCita({
              invoice_number: invoice,
              user_id: State.get('userId'),
              mascota_id: mascotaId,
              servicio: servicio,
              fecha_hora: fechaHora,
              precio: precio,
              notas_cliente: notas,
              estado: 'Pendiente',
              origen: 'web',
            });

            showToast('¡Cita agendada! Código: ' + invoice, 'success');
            document.getElementById('clientBookingNotes').value = '';
            const citas = await Services.getCitas(State.get('userId'));
            State.set('citas', citas);
            this._renderTab('mis_citas');
          } catch (error) {
            showToast('Error: ' + error.message, 'error');
          } finally {
            setLoading('clientBookBtn', false);
          }
        };
      },

      _renderCitas(cont) {
        const citas = State.get('citas') || [];
        if (!citas.length) {
          cont.innerHTML =
            `<div class="card"><div class="card-title"><i class="fas fa-calendar-alt"></i> Mis citas</div><p class="text-muted">No tienes citas registradas.</p></div>`;
          return;
        }

            <div class="card-title"><i class="fas fa-calendar-alt"></i> Mis citas (${citas.length})</div>

              const estadoClass = {
                'Pendiente': 'badge-pending',
                'Confirmada': 'badge-info',
                'Finalizada': 'badge-success',

              }[c.estado] || 'badge-pending';
              return `
                <div class="order-card" style="background:var(--bg-white);border:1px solid #f0ece4;border-radius:12px;padding:16px;margin-bottom:12px;">
                  <div class="flex-between">
                    <div>
                      <strong>${escHtml(c.servicio || '')}</strong>
                      <span class="badge ${estadoClass}" style="margin-left:8px;">${escHtml(c.estado || 'Pendiente')}</span>
                    </div>
                    <span class="text-muted" style="font-size:0.8rem;">${formatDate(c.fecha_hora)}</span>
                  </div>

                  </div>
                  ${c.estado === 'Pendiente' ? `
                    <div style="margin-top:8px;">
                      <button class="btn btn-danger btn-sm" onclick="ClientModule.cancelarCitaCliente('${c.id}')">Cancelar</button>

              `;
            }).join('')}
          </div>
