      // ✅ EXPUESTO PÚBLICAMENTE para onclick
      cancelarCitaCliente(id) {
        if (!confirm('¿Cancelar esta cita?')) return;
        Services.updateCita(id, { estado: 'Cancelada' })
          .then(async () => {
            showToast('Cita cancelada', 'info');
            const citas = await Services.getCitas(State.get('userId'));
            State.set('citas', citas);
            this._renderTab('mis_citas');
          })
          .catch(err => showToast('Error: ' + err.message, 'error'));
      },

      _renderMascotas(cont) {
        const mascotas = State.get('mascotas') || [];
        cont.innerHTML = `
          <div class="card">
            <div class="card-title"><i class="fas fa-paw"></i> Mis mascotas (${mascotas.length})</div>
            ${mascotas.length ? `
              <div class="grid-3">
                ${mascotas.map(m => `
                  <div style="background:var(--bg-primary);border-radius:12px;padding:16px;text-align:center;">
                    <div style="font-size:2.5rem;margin-bottom:4px;">🐶</div>
                    <div><strong>${escHtml(m.nombre)}</strong></div>
                    <div style="font-size:0.85rem;color:var(--text-secondary);">${escHtml(m.raza || 'Sin raza')}</div>
                    ${m.edad ? `<div style="font-size:0.8rem;color:var(--text-secondary);">${m.edad} años</div>` : ''}
                    ${m.peso ? `<div style="font-size:0.8rem;color:var(--text-secondary);">${m.peso} kg</div>` : ''}
                  </div>
                `).join('')}
              </div>
            ` : '<p class="text-muted">No tienes mascotas registradas. Agrega una desde tu perfil o al agendar una cita.</p>'}
            <button class="btn btn-primary mt-2" onclick="ClientModule.agregarMascotaCliente()"><i class="fas fa-plus"></i> Agregar mascota</button>
          </div>
        `;
      },

      // ✅ EXPUESTO PÚBLICAMENTE para onclick
      agregarMascotaCliente() {
        const nombre = prompt('Nombre de tu mascota:');
        if (!nombre) return;
        const raza = prompt('Raza (opcional):') || '';
        Services.createMascota({
          user_id: State.get('userId'),
          nombre: nombre,
          raza: raza,
        }).then(async () => {
          showToast('Mascota agregada', 'success');
          const mascotas = await Services.getMascotas(State.get('userId'));
          State.set('mascotas', mascotas);
          this._renderTab('mis_mascotas');
          this._renderTab('agendar');
        }).catch(err => showToast('Error: ' + err.message, 'error'));
      },

      _renderGaleria(cont) {
        const fotos = State.get('fotos') || [];
        const autorizadas = fotos.filter(f => f.estado === 'autorizada');
        cont.innerHTML = `
          <div class="card">
            <div class="card-title"><i class="fas fa-images"></i> Galería de fotos</div>
            <button class="btn btn-primary mb-2" id="clientUploadPhotoBtn"><i class="fas fa-upload"></i> Subir fotos</button>
            <div class="photo-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-top:16px;">
              ${autorizadas.length ? autorizadas.map(f => `
                <div style="background:var(--bg-white);border-radius:12px;overflow:hidden;border:1px solid #f0ece4;">
                  <img src="${escHtml(f.url)}" alt="Foto" style="width:100%;height:180px;object-fit:cover;" />
                  <div style="padding:8px 12px;font-size:0.8rem;">
                    <div>${escHtml(f.descripcion || 'Sin descripción')}</div>
                    <div class="text-muted" style="font-size:0.7rem;">${formatDateShort(f.fecha_subida)}</div>
                  </div>
                </div>
              `).join('') : '<p class="text-muted">No hay fotos autorizadas. Sube fotos de tus mascotas para compartir.</p>'}
            </div>
          </div>
        `;

        document.getElementById('clientUploadPhotoBtn').onclick = () => {
          const mascotas = State.get('mascotas') || [];
          const select = document.getElementById('photoPetSelect');
          select.innerHTML = '<option value="">-- Elige --</option>' +
            mascotas.map(m => `<option value="${m.id}">${escHtml(m.nombre)}</option>`).join('');
          openModal('photoUploadModal');
        };
      },

      _initModals() {
        document.querySelectorAll('.modal-overlay').forEach(m => {
          m.addEventListener('click', e => {
            if (e.target === m) m.classList.add('hidden');
          });
        });

        document.getElementById('photoUploadBtn').onclick = async () => {
          const mascotaId = getFormValue('photoPetSelect');
          const beforeFile = document.getElementById('photoBefore').files[0];
          const afterFile = document.getElementById('photoAfter').files[0];
          const desc = getFormValue('photoDesc');

          if (!mascotaId) { showToast('Selecciona una mascota', 'error'); return; }
          if (!beforeFile) { showToast('La foto "Antes" es obligatoria', 'error'); return; }

          setLoading('photoUploadBtn', true, 'Subiendo...');
          try {
            const beforePath = `mascotas/${mascotaId}/antes_${Date.now()}.jpg`;
            const { error: beforeError } = await supabaseClient.storage
              .from('fotos')
              .upload(beforePath, beforeFile);
            if (beforeError) throw new Error(beforeError.message);

            const { data: beforeUrl } = supabaseClient.storage
              .from('fotos')
              .getPublicUrl(beforePath);

            await Services.createFoto({
              mascota_id: mascotaId,
              url: beforeUrl.publicUrl,
              tipo_foto: 'antes',
              descripcion: desc || 'Antes del servicio',
              estado: 'pendiente',
            });

            if (afterFile) {
              const afterPath = `mascotas/${mascotaId}/despues_${Date.now()}.jpg`;
              const { error: afterError } = await supabaseClient.storage
                .from('fotos')
                .upload(afterPath, afterFile);
              if (!afterError) {
                const { data: afterUrl } = supabaseClient.storage
                  .from('fotos')
                  .getPublicUrl(afterPath);
                await Services.createFoto({
                  mascota_id: mascotaId,
                  url: afterUrl.publicUrl,
                  tipo_foto: 'despues',
                  descripcion: desc || 'Después del servicio',
                  estado: 'pendiente',
                });
              }
            }

            showToast('Fotos subidas y en revisión', 'success');
            closeModal('photoUploadModal');
            document.getElementById('photoBefore').value = '';
            document.getElementById('photoAfter').value = '';
            document.getElementById('photoDesc').value = '';

            const fotos = await Services.getFotos();
            State.set('fotos', fotos);
            this._renderTab('galeria');
          } catch (error) {
            showToast('Error: ' + error.message, 'error');
          } finally {
            setLoading('photoUploadBtn', false);
          }
        };

        document.getElementById('photoUploadCancelBtn').onclick = () => {
          closeModal('photoUploadModal');
        };

        document.getElementById('closeSupportBtn').onclick = () => closeModal('supportModal');
        document.getElementById('closeSugBtn').onclick = () => closeModal('suggestionModal');

        document.getElementById('sendSugBtn').onclick = async () => {
          const nombre = getFormValue('sugNombre');
          const email = getFormValue('sugEmail');
          const mensaje = getFormValue('sugMsg');
          if (!nombre || !mensaje) {
            showToast('Nombre y mensaje son obligatorios', 'error');
            return;
          }
          setLoading('sendSugBtn', true, 'Enviando...');
          try {
            await Services.createSugerencia({ nombre, email, mensaje });
            showToast('¡Gracias por tu sugerencia!', 'success');
            closeModal('suggestionModal');
            setFormValue('sugNombre', '');
            setFormValue('sugEmail', '');
            setFormValue('sugMsg', '');
          } catch (error) {
            showToast('Error: ' + error.message, 'error');
          } finally {
            setLoading('sendSugBtn', false);
          }
        };
      },
    };

    // ✅ EXPONER MÓDULO DE CLIENTES GLOBALMENTE
    window.ClientModule = ClientModule;

    // ================================================================
    // 9. MÓDULO DE ADMINISTRACIÓN (CORREGIDO)
    // ================================================================

    const AdminModule = {
      init() {
        Logger.info('AdminModule init');
        const nombre = State.get('nombre');
        document.getElementById('adminWelcome').textContent = nombre;
        document.getElementById('adminLogout').onclick = () => {
          Services.logout();
          location.reload();
        };

        this._initTabs();
        this._renderTabs();
        this._initModals();
        renderFooter('footerAdmin');
      },

      _initTabs() {
        const nav = document.getElementById('adminTabNav');
        const main = document.getElementById('adminMain');
        const tabs = [
          { id: 'dashboard', label: '📊 Dashboard' },
          { id: 'agenda', label: '📅 Agenda' },
          { id: 'clientes', label: '👥 Clientes' },
          { id: 'fotos', label: '📸 Fotos' },
          { id: 'inventario', label: '📦 Inventario' },
          { id: 'gastos', label: '💰 Gastos' },
          { id: 'caja', label: '💵 Caja' },
          { id: 'reportes', label: '📈 Reportes' },
        ];

        nav.innerHTML = tabs.map((t, i) =>
          `<button class="tab-btn${i === 0 ? ' active' : ''}" data-atab="${t.id}">${t.label}</button>`
        ).join('');

        main.innerHTML = tabs.map((t, i) =>
          `<div id="atab-${t.id}" class="panel${i === 0 ? ' active' : ''}"></div>`
        ).join('');

        nav.querySelectorAll('[data-atab]').forEach(btn => {
          btn.onclick = () => {
            nav.querySelectorAll('[data-atab]').forEach(b => b.classList.remove('active'));
            main.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(`atab-${btn.dataset.atab}`).classList.add('active');
            this._renderTab(btn.dataset.atab);
          };
        });
      },

      _renderTabs() {
        ['dashboard', 'agenda', 'clientes', 'fotos', 'inventario', 'gastos', 'caja', 'reportes'].forEach(tab =>
          this._renderTab(tab));
      },

      _renderTab(tab) {
        const cont = document.getElementById(`atab-${tab}`);
        if (!cont) return;
        switch (tab) {
          case 'dashboard':
            this._renderDashboard(cont);
            break;
          case 'agenda':
            this._renderAgenda(cont);
            break;
          case 'clientes':
            this._renderClientes(cont);
            break;
          case 'fotos':
            this._renderFotos(cont);
            break;
          case 'inventario':
            this._renderInventario(cont);
            break;
          case 'gastos':
            this._renderGastos(cont);
            break;
          case 'caja':
            this._renderCaja(cont);
            break;
          case 'reportes':
            this._renderReportes(cont);
            break;
        }
      },

      _renderDashboard(cont) {
        const citas = State.get('citas') || [];
        const pagos = State.get('pagos') || [];
        const gastos = State.get('gastos') || [];
        const fotos = State.get('fotos') || [];
        const usuarios = State.get('usuarios') || [];

        const totalIngresos = pagos.reduce((s, p) => s + (p.monto || 0), 0);
        const totalGastos = gastos.reduce((s, g) => s + (g.monto || 0), 0);
        const utilidad = totalIngresos - totalGastos;
        const pendientes = fotos.filter(f => f.estado === 'pendiente');
        const hoy = new Date().toISOString().split('T')[0];
        const citasHoy = citas.filter(c => c.fecha_hora && c.fecha_hora.startsWith(hoy));

        cont.innerHTML = `
          <div class="meta-hero" style="background:linear-gradient(145deg,#1c0f05,#3a1e06,#5a2e0a);border-radius:16px;padding:24px;color:white;margin-bottom:20px;">
            <div style="font-size:0.8rem;text-transform:uppercase;opacity:0.7;">Resumen del negocio</div>
            <div style="font-size:2.2rem;font-weight:700;color:var(--primary-light);">${formatCurrency(utilidad)}</div>
            <div style="display:flex;gap:20px;flex-wrap:wrap;margin-top:8px;">
              <span>Ingresos: <strong>${formatCurrency(totalIngresos)}</strong></span>
              <span>Gastos: <strong>${formatCurrency(totalGastos)}</strong></span>
              <span>Citas hoy: <strong>${citasHoy.length}</strong></span>
            </div>
          </div>
          <div class="grid-4" style="margin-bottom:20px;">
            <div class="stat-card">
              <div class="stat-icon">📅</div>
              <div class="stat-value">${citas.length}</div>
              <div class="stat-label">Total citas</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">📸</div>
              <div class="stat-value">${pendientes.length}</div>
              <div class="stat-label">Fotos pendientes</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">💰</div>
              <div class="stat-value">${formatCurrency(totalIngresos)}</div>
              <div class="stat-label">Ingresos totales</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon">💳</div>
              <div class="stat-value">${formatCurrency(totalGastos)}</div>
              <div class="stat-label">Gastos totales</div>
            </div>
          </div>
          ${pendientes.length > 0 ? `
            <div style="background:#fef7e0;border-left:6px solid var(--warning);padding:16px 20px;border-radius:8px;margin-bottom:20px;cursor:pointer;" onclick="AdminModule.goToTab('fotos')">
              <div style="font-weight:600;">📸 Fotos pendientes de autorizar <span style="background:var(--error);color:white;border-radius:20px;padding:0 10px;">${pendientes.length}</span></div>
              <div style="font-size:0.9rem;color:var(--text-secondary);">Haz clic para revisarlas.</div>
            </div>
          ` : ''}
          <div class="card">
            <div class="card-title"><i class="fas fa-chart-bar"></i> Ingresos vs Gastos</div>
            <canvas id="dashboardChart" height="120"></canvas>
          </div>
        `;

        setTimeout(() => {
          const canvas = document.getElementById('dashboardChart');
          if (!canvas) return;
          const ctx = canvas.getContext('2d');
          if (window._dashboardChart) window._dashboardChart.destroy();
          window._dashboardChart = new Chart(ctx, {
            type: 'bar',
            data: {
              labels: ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'],
              datasets: [{
                label: 'Ingresos',
                data: [2.5, 3.0, 2.8, 3.5, 4.0, 3.8, 4.2, 4.5, 4.8, 5.0, 4.6, 5.2],
                backgroundColor: 'rgba(45,125,70,0.7)',
              }, {
                label: 'Gastos',
                data: [1.2, 1.5, 1.3, 1.8, 2.0, 1.9, 2.1, 2.2, 2.3, 2.5, 2.4, 2.6],
                backgroundColor: 'rgba(178,59,42,0.7)',
              }],
            },
            options: {
              responsive: true,
              maintainAspectRatio: true,
              plugins: { legend: { position: 'top' } },
              scales: { y: { ticks: { callback: v => '$' + v + 'M' } } },
            },
          });
        }, 100);
      },

      _renderAgenda(cont) {
        const citas = State.get('citas') || [];
        const hoy = new Date().toISOString().split('T')[0];
        const citasHoy = citas.filter(c => c.fecha_hora && c.fecha_hora.startsWith(hoy));

        cont.innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:16px;">
            <h3 style="font-size:1.2rem;">📅 Citas de hoy (${citasHoy.length})</h3>
            <button class="btn btn-primary" id="adminNewAppointmentBtn"><i class="fas fa-plus"></i> Nueva cita</button>
          </div>
          <div id="adminAgendaList">
            ${citasHoy.length ? citasHoy.map(c => this._citaCard(c)).join('') : '<p class="text-muted">No hay citas para hoy.</p>'}
          </div>
          <div class="card mt-2">
            <div class="card-title"><i class="fas fa-list"></i> Todas las citas</div>
            <div id="adminAllCitasList">
              ${citas.slice(0, 20).map(c => this._citaCard(c)).join('') || '<p class="text-muted">No hay citas registradas.</p>'}
            </div>
          </div>
        `;

        document.getElementById('adminNewAppointmentBtn').onclick = () => {
          openModal('appointmentModal');
        };
      },

      _citaCard(c) {
        const estadoClass = {
          'Pendiente': 'badge-pending',
          'Confirmada': 'badge-info',
          'Finalizada': 'badge-success',
          'Cancelada': 'badge-danger',
        } [c.estado] || 'badge-pending';

        const origen = c.origen === 'mostrador' ? '📌 Mostrador' : '🌐 Web';

        return `
          <div style="background:var(--bg-white);border:1px solid #f0ece4;border-radius:12px;padding:16px;margin-bottom:12px;">
            <div class="flex-between" style="flex-wrap:wrap;gap:8px;">
              <div>
                <span style="font-weight:600;">${escHtml(c.invoice_number || '')}</span>
                <span class="badge ${estadoClass}" style="margin-left:8px;">${escHtml(c.estado || 'Pendiente')}</span>
                <span style="font-size:0.75rem;color:var(--text-secondary);margin-left:8px;">${origen}</span>
              </div>
              <span style="font-size:0.8rem;color:var(--text-secondary);">${formatDate(c.fecha_hora)}</span>
            </div>
            <div style="margin-top:4px;font-size:0.9rem;">
              <strong>${escHtml(c.servicio || '')}</strong> · ${formatCurrency(c.precio || 0)}
              ${c.notas_cliente ? ` · <span style="font-style:italic;color:var(--text-secondary);">${escHtml(c.notas_cliente)}</span>` : ''}
              ${c.notas_admin ? ` · <span style="color:var(--info);font-size:0.85rem;">📝 ${escHtml(c.notas_admin)}</span>` : ''}
            </div>
            <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">
              ${c.estado === 'Pendiente' ? `<button class="btn btn-info btn-sm" onclick="AdminModule.confirmarCitaAdmin('${c.id}')">Confirmar</button>` : ''}
              ${c.estado === 'Confirmada' || c.estado === 'Pendiente' ? `<button class="btn btn-success btn-sm" onclick="AdminModule.finalizarCitaAdmin('${c.id}')">Finalizar</button>` : ''}
              ${c.estado !== 'Cancelada' && c.estado !== 'Finalizada' ? `<button class="btn btn-danger btn-sm" onclick="AdminModule.cancelarCitaAdmin('${c.id}')">Cancelar</button>` : ''}
              <button class="btn btn-ghost btn-sm" onclick="AdminModule.verCitaAdmin('${c.id}')">Detalles</button>
            </div>
          </div>
        `;
      },

      _renderClientes(cont) {
        const usuarios = State.get('usuarios') || [];
        cont.innerHTML = `
          <div class="card">
            <div class="card-title"><i class="fas fa-users"></i> Gestión de clientes (${usuarios.length})</div>
            <div style="margin-bottom:12px;">
              <input type="text" id="clientSearchInput" placeholder="🔍 Buscar por nombre o teléfono..." style="width:100%;padding:10px 16px;border:2px solid #e8e0d8;border-radius:8px;font-size:0.9rem;" />
            </div>
            <div class="table-wrap">
              <table class="table">
                <thead>
                  <tr><th>Nombre</th><th>Teléfono</th><th>Email</th><th>Acciones</th></tr>
                </thead>
                <tbody id="clientesTableBody">
                  ${usuarios.map(u => `
                    <tr>
                      <td><input id="ac_n_${u.user_id}" value="${escHtml(u.nombre || '')}" style="width:100%;padding:6px 10px;border:1px solid #e8e0d8;border-radius:6px;" /></td>
                      <td>${escHtml(u.telefono || '')}</td>
                      <td>${escHtml(u.email || '')}</td>
                      <td>
                        <button class="btn btn-primary btn-sm" onclick="AdminModule.guardarClienteAdmin('${u.user_id}')">Guardar</button>
                        ${u.user_id !== State.get('userId') ? `<button class="btn btn-danger btn-sm" onclick="AdminModule.eliminarClienteAdmin('${u.user_id}')">Eliminar</button>` : ''}
                      </td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>
        `;

        document.getElementById('clientSearchInput').addEventListener('input', function() {
          const query = this.value.toLowerCase().trim();
          const filtered = (State.get('usuarios') || []).filter(u =>
            (u.nombre || '').toLowerCase().includes(query) ||
            (u.telefono || '').includes(query)
          );
          const tbody = document.getElementById('clientesTableBody');
          tbody.innerHTML = filtered.length ? filtered.map(u => `
            <tr>
              <td><input id="ac_n_${u.user_id}" value="${escHtml(u.nombre || '')}" style="width:100%;padding:6px 10px;border:1px solid #e8e0d8;border-radius:6px;" /></td>
              <td>${escHtml(u.telefono || '')}</td>
              <td>${escHtml(u.email || '')}</td>
              <td>
                <button class="btn btn-primary btn-sm" onclick="AdminModule.guardarClienteAdmin('${u.user_id}')">Guardar</button>
                ${u.user_id !== State.get('userId') ? `<button class="btn btn-danger btn-sm" onclick="AdminModule.eliminarClienteAdmin('${u.user_id}')">Eliminar</button>` : ''}
              </td>
            </tr>
          `).join('') : '<tr><td colspan="4" class="text-muted text-center">No se encontraron clientes</td></tr>';
        });
      },

      _renderFotos(cont) {
        const fotos = State.get('fotos') || [];
        const pendientes = fotos.filter(f => f.estado === 'pendiente');
        const autorizadas = fotos.filter(f => f.estado === 'autorizada');

        cont.innerHTML = `
          <div class="card">
            <div class="card-title"><i class="fas fa-clock"></i> Fotos pendientes (${pendientes.length})</div>
            ${pendientes.length ? this._fotoGrid(pendientes, true) : '<p class="text-muted">No hay fotos pendientes</p>'}
          </div>
          <div class="card">
            <div class="card-title"><i class="fas fa-check-circle" style="color:var(--success);"></i> Fotos autorizadas (${autorizadas.length})</div>
            ${autorizadas.length ? this._fotoGrid(autorizadas.slice(0, 20), false) : '<p class="text-muted">No hay fotos autorizadas</p>'}
          </div>
        `;
      },

      _fotoGrid(fotos, showActions) {
        return `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;">
          ${fotos.map(f => `
            <div style="background:var(--bg-white);border-radius:12px;overflow:hidden;border:1px solid #f0ece4;">
              <img src="${escHtml(f.url)}" alt="Foto" style="width:100%;height:160px;object-fit:cover;" />
              <div style="padding:8px 12px;font-size:0.8rem;">
                <div><strong>${f.tipo_foto === 'antes' ? '📸 Antes' : f.tipo_foto === 'despues' ? '✨ Después' : '📷 General'}</strong>
                <span class="badge ${f.estado === 'pendiente' ? 'badge-pending' : f.estado === 'autorizada' ? 'badge-success' : 'badge-danger'}" style="margin-left:6px;">${escHtml(f.estado)}</span></div>
                <div class="text-muted" style="font-size:0.7rem;">${formatDateShort(f.fecha_subida)}</div>
                ${f.descripcion ? `<div style="font-size:0.75rem;color:var(--text-secondary);">${escHtml(f.descripcion)}</div>` : ''}
              </div>
              ${showActions ? `
                <div style="padding:8px 12px;border-top:1px solid #f0ece4;display:flex;gap:6px;">
                  <button class="btn btn-success btn-sm" onclick="AdminModule.autorizarFotoAdmin('${f.id}')"><i class="fas fa-check"></i></button>
                  <button class="btn btn-danger btn-sm" onclick="AdminModule.rechazarFotoAdmin('${f.id}')"><i class="fas fa-times"></i></button>
                </div>
              ` : `
                <div style="padding:8px 12px;border-top:1px solid #f0ece4;">
                  <button class="btn btn-danger btn-sm" onclick="AdminModule.eliminarFotoAdmin('${f.id}')"><i class="fas fa-trash"></i> Eliminar</button>
                </div>
              `}
            </div>
          `).join('')}
        </div>`;
      },

      _renderInventario(cont) {
        const productos = State.get('productos') || [];
        cont.innerHTML = `
          <div class="card">
            <div class="card-title"><i class="fas fa-boxes"></i> Inventario (${productos.length})</div>
            <button class="btn btn-primary mb-2" id="adminAddProductBtn"><i class="fas fa-plus"></i> Agregar producto</button>
            <div class="table-wrap">
              <table class="table">
                <thead>
                  <tr><th>Nombre</th><th>Categoría</th><th>Stock</th><th>Min.</th><th>Precio compra</th><th>Acciones</th></tr>
                </thead>
                <tbody>
                  ${productos.map(p => `
                    <tr>
                      <td>${escHtml(p.nombre || '')}</td>
                      <td>${escHtml(p.categoria || '')}</td>
                      <td><span style="font-weight:600;${p.stock_actual <= p.stock_minimo ? 'color:var(--error);' : ''}">${p.stock_actual || 0}</span></td>
                      <td>${p.stock_minimo || 0}</td>
                      <td>${formatCurrency(p.precio_compra || 0)}</td>
                      <td>
                        <button class="btn btn-info btn-sm" onclick="AdminModule.ajustarStockAdmin('${p.id}')">Ajustar</button>
                        <button class="btn btn-danger btn-sm" onclick="AdminModule.eliminarProductoAdmin('${p.id}')">Eliminar</button>
                      </td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>
        `;

        document.getElementById('adminAddProductBtn').onclick = () => {
          const nombre = prompt('Nombre del producto:');
          if (!nombre) return;
          const categoria = prompt('Categoría:') || '';
          const stock = parseInt(prompt('Stock inicial:')) || 0;
          const precio = parseFloat(prompt('Precio de compra:')) || 0;
          Services.createProducto({
            nombre,
            categoria,
            stock_actual: stock,
            stock_minimo: 5,
            precio_compra: precio,
          }).then(async () => {
            showToast('Producto agregado', 'success');
            const productos = await Services.getProductos();
            State.set('productos', productos);
            this._renderTab('inventario');
          }).catch(err => showToast('Error: ' + err.message, 'error'));
        };
      },

      _renderGastos(cont) {
        const gastos = State.get('gastos') || [];
        const total = gastos.reduce((s, g) => s + (g.monto || 0), 0);

        cont.innerHTML = `
          <div class="card">
            <div class="card-title"><i class="fas fa-coins"></i> Gastos operativos</div>
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:12px;">
              <span>Total: <strong>${formatCurrency(total)}</strong></span>
              <button class="btn btn-primary" id="adminAddGastoBtn"><i class="fas fa-plus"></i> Registrar gasto</button>
            </div>
            <div class="table-wrap">
              <table class="table">
                <thead>
                  <tr><th>Concepto</th><th>Categoría</th><th>Monto</th><th>Fecha</th><th>Acciones</th></tr>
                </thead>
                <tbody>
                  ${gastos.map(g => `
                    <tr>
                      <td>${escHtml(g.concepto || '')}</td>
                      <td>${escHtml(g.categoria || '')}</td>
                      <td>${formatCurrency(g.monto || 0)}</td>
                      <td>${formatDateShort(g.fecha)}</td>
                      <td>
                        <button class="btn btn-danger btn-sm" onclick="AdminModule.eliminarGastoAdmin('${g.id}')">Eliminar</button>
                      </td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>
        `;

        document.getElementById('adminAddGastoBtn').onclick = () => {
          const concepto = prompt('Concepto del gasto:');
          if (!concepto) return;
          const categoria = prompt('Categoría:') || 'OTROS';
          const monto = parseFloat(prompt('Monto:'));
          if (isNaN(monto) || monto <= 0) { showToast('Monto inválido', 'error'); return; }
          Services.createGasto({
            concepto,
            categoria,
            monto,
            fecha: new Date().toISOString().split('T')[0],
          }).then(async () => {
            showToast('Gasto registrado', 'success');
            const gastos = await Services.getGastos();
            State.set('gastos', gastos);
            this._renderTab('gastos');
          }).catch(err => showToast('Error: ' + err.message, 'error'));
        };
      },

      _renderCaja(cont) {
        const pagos = State.get('pagos') || [];
        const total = pagos.reduce((s, p) => s + (p.monto || 0), 0);

        cont.innerHTML = `
          <div class="card">
            <div class="card-title"><i class="fas fa-cash-register"></i> Caja</div>
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:12px;">
              <span>Total recaudado: <strong>${formatCurrency(total)}</strong></span>
              <button class="btn btn-primary" id="adminAddPagoBtn"><i class="fas fa-plus"></i> Registrar pago</button>
            </div>
            <div class="table-wrap">
              <table class="table">
                <thead>
                  <tr><th>Referencia</th><th>Monto</th><th>Método</th><th>Fecha</th></tr>
                </thead>
                <tbody>
                  ${pagos.map(p => `
                    <tr>
                      <td>${escHtml(p.referencia || '')}</td>
                      <td>${formatCurrency(p.monto || 0)}</td>
                      <td>${escHtml(p.metodo || '')}</td>
                      <td>${formatDateShort(p.fecha_pago)}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>
        `;

        document.getElementById('adminAddPagoBtn').onclick = () => {
          const monto = parseFloat(prompt('Monto del pago:'));
          if (isNaN(monto) || monto <= 0) { showToast('Monto inválido', 'error'); return; }
          const metodo = prompt('Método (efectivo, nequi, daviplata, transferencia):') || 'efectivo';
          const referencia = prompt('Referencia (opcional):') || '';
          Services.createPago({
            monto,
            metodo,
            referencia,
            fecha_pago: new Date().toISOString(),
          }).then(async () => {
            showToast('Pago registrado', 'success');
            const pagos = await Services.getPagos();
            State.set('pagos', pagos);
            this._renderTab('caja');
          }).catch(err => showToast('Error: ' + err.message, 'error'));
        };
      },

      _renderReportes(cont) {
        const citas = State.get('citas') || [];
        const pagos = State.get('pagos') || [];
        const gastos = State.get('gastos') || [];

        const totalIngresos = pagos.reduce((s, p) => s + (p.monto || 0), 0);
        const totalGastos = gastos.reduce((s, g) => s + (g.monto || 0), 0);
        const utilidad = totalIngresos - totalGastos;

        cont.innerHTML = `
          <div class="card">
            <div class="card-title"><i class="fas fa-file-alt"></i> Reportes financieros</div>
            <div class="grid-3">
              <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-value">${formatCurrency(totalIngresos)}</div>
                <div class="stat-label">Ingresos totales</div>
              </div>
              <div class="stat-card">
                <div class="stat-icon">💳</div>
                <div class="stat-value">${formatCurrency(totalGastos)}</div>
                <div class="stat-label">Gastos totales</div>
              </div>
              <div class="stat-card" style="border-color:${utilidad >= 0 ? 'var(--success)' : 'var(--error)'};">
                <div class="stat-icon">📈</div>
                <div class="stat-value" style="color:${utilidad >= 0 ? 'var(--success)' : 'var(--error)'};">${formatCurrency(utilidad)}</div>
                <div class="stat-label">Utilidad / Pérdida</div>
              </div>
            </div>
            <div style="margin-top:16px;">
              <h4>Resumen de citas</h4>
              <div class="grid-2">
                <div><strong>Total citas:</strong> ${citas.length}</div>
                <div><strong>Completadas:</strong> ${citas.filter(c => c.estado === 'Finalizada' || c.estado === 'Completada').length}</div>
                <div><strong>Canceladas:</strong> ${citas.filter(c => c.estado === 'Cancelada').length}</div>
                <div><strong>Pendientes:</strong> ${citas.filter(c => c.estado === 'Pendiente').length}</div>
              </div>
            </div>
            <button class="btn btn-primary mt-2" onclick="AdminModule.exportarCSVAdmin()"><i class="fas fa-download"></i> Exportar reporte CSV</button>
          </div>
        `;
      },

      _initModals() {
        document.querySelectorAll('.modal-overlay').forEach(m => {
          m.addEventListener('click', e => {
            if (e.target === m) m.classList.add('hidden');
          });
        });

        const searchInput = document.getElementById('appClientSearch');
        const resultsDiv = document.getElementById('appClientResults');
        let searchTimeout;

        searchInput.oninput = () => {
          clearTimeout(searchTimeout);
          const query = searchInput.value.trim();
          if (query.length < 2) { resultsDiv.innerHTML = ''; return; }
          searchTimeout = setTimeout(async () => {
            try {
              const { data } = await supabaseClient
                .from('usuarios')
                .select('user_id, nombre, telefono, email')
                .ilike('nombre', `%${query}%`)
                .limit(5);
              if (data && data.length) {
                resultsDiv.innerHTML = data.map(u =>
                  `<div style="padding:8px 12px;cursor:pointer;border-bottom:1px solid #f0ece4;" onclick="AdminModule.seleccionarClienteAdmin('${u.user_id}','${escHtml(u.nombre)}','${escHtml(u.telefono || '')}')">
                    ${escHtml(u.nombre)}${u.telefono ? ` - ${escHtml(u.telefono)}` : ''}
                  </div>`
                ).join('');
              } else {
                resultsDiv.innerHTML =
                  `<div style="padding:8px 12px;color:var(--text-secondary);">No se encontraron clientes. <button class="btn btn-primary btn-sm" onclick="AdminModule.crearClienteRapidoAdmin()">Crear nuevo</button></div>`;
              }
            } catch (e) {
              resultsDiv.innerHTML = '';
            }
          }, 300);
        };

        document.getElementById('appCancelBtn').onclick = () => closeModal('appointmentModal');

        document.getElementById('appConfirmBtn').onclick = async () => {
          const clienteId = window._appSelectedClientId;
          const mascotaId = getFormValue('appPetSelect');
          const servicio = getFormValue('appServiceSelect');
          const precio = parseFloat(getFormValue('appPrice')) || 0;
          const fecha = getFormValue('appDate');
          const hora = getFormValue('appTime');
          const notas = getFormValue('appNotes');

          if (!clienteId) { showToast('Selecciona un cliente', 'error'); return; }
          if (!mascotaId) { showToast('Selecciona una mascota', 'error'); return; }
          if (!fecha) { showToast('Selecciona una fecha', 'error'); return; }

          setLoading('appConfirmBtn', true, 'Guardando...');
          try {
            const fechaHora = new Date(`${fecha}T${hora}:00`).toISOString();
            const invoice = 'LUT-' + Date.now().toString(36).toUpperCase();
            await Services.createCita({
              invoice_number: invoice,
              user_id: clienteId,
              mascota_id: mascotaId,
              servicio: servicio,
              fecha_hora: fechaHora,
              precio: precio,
              notas_cliente: notas,
              estado: 'Confirmada',
              origen: 'mostrador',
            });
            showToast('¡Cita agendada!', 'success');
            closeModal('appointmentModal');
            const citas = await Services.getAllCitas();
            State.set('citas', citas);
            this._renderTab('agenda');
          } catch (error) {
            showToast('Error: ' + error.message, 'error');
          } finally {
            setLoading('appConfirmBtn', false);
          }
        };

        document.getElementById('appNewPetBtn').onclick = () => {
          const userId = window._appSelectedClientId;
          if (!userId) { showToast('Selecciona un cliente primero', 'error'); return; }
          const nombre = prompt('Nombre de la mascota:');
          if (nombre) {
            Services.createMascota({ user_id: userId, nombre })
              .then(() => {
                this._cargarMascotasModal(userId);
              })
              .catch(err => showToast('Error: ' + err.message, 'error'));
          }
        };

        document.getElementById('appDate').value = new Date().toISOString().split('T')[0];
      },

      // ✅ MÉTODOS PÚBLICOS EXPUESTOS
      seleccionarClienteAdmin(userId, nombre, telefono) {
        document.getElementById('appClientSelected').value = nombre + (telefono ? ` - ${telefono}` : '');
        document.getElementById('appClientResults').innerHTML = '';
        window._appSelectedClientId = userId;
        this._cargarMascotasModal(userId);
      },

      crearClienteRapidoAdmin() {
        const nombre = prompt('Nombre del cliente:');
        if (!nombre) return;
        const telefono = prompt('Teléfono:') || '';
        const uid = crypto.randomUUID();
        supabaseClient.from('usuarios').insert({
          user_id: uid,
          nombre,
          telefono,
          tipo: 'cliente',
          es_admin: false,
        }).then(() => {
          window._appSelectedClientId = uid;
          document.getElementById('appClientSelected').value = nombre + (telefono ? ` - ${telefono}` : '');
          document.getElementById('appClientResults').innerHTML = '';
          this._cargarMascotasModal(uid);
          showToast('Cliente creado', 'success');
        }).catch(err => showToast('Error: ' + err.message, 'error'));
      },

      async _cargarMascotasModal(userId) {
        try {
          const { data } = await supabaseClient
            .from('mascotas')
            .select('*')
            .eq('user_id', userId);
          const sel = document.getElementById('appPetSelect');
          sel.innerHTML = '<option value="">-- Selecciona --</option>' +
            (data || []).map(m => `<option value="${m.id}">${escHtml(m.nombre)} (${escHtml(m.raza || 'sin raza')})</option>`).join('');
          if (!data || !data.length) {
            sel.innerHTML += '<option value="new">+ Crear nueva mascota</option>';
          }
          sel.onchange = () => {
            if (sel.value === 'new') {
              const nombre = prompt('Nombre de la mascota:');
              if (nombre) {
                Services.createMascota({ user_id: userId, nombre })
                  .then(() => this._cargarMascotasModal(userId));
              }
              sel.value = '';
            }
          };
        } catch (e) {
          // Silenciar
        }
      },

      confirmarCitaAdmin(id) {
        Services.updateCita(id, { estado: 'Confirmada' })
          .then(async () => {
            showToast('Cita confirmada', 'success');
            const citas = await Services.getAllCitas();
            State.set('citas', citas);
            this._renderTab('agenda');
          })
          .catch(err => showToast('Error: ' + err.message, 'error'));
      },

      finalizarCitaAdmin(id) {
        Services.updateCita(id, { estado: 'Finalizada' })
          .then(async () => {
            const cita = (State.get('citas') || []).find(c => c.id === id);
            if (cita && cita.precio) {
              await Services.createPago({
                cita_id: id,
                monto: cita.precio,
                metodo: 'efectivo',
                referencia: `Pago cita ${cita.invoice_number}`,
                fecha_pago: new Date().toISOString(),
              });
            }
            showToast('Cita finalizada y pago registrado', 'success');
            const [citas, pagos] = await Promise.all([
              Services.getAllCitas(),
              Services.getPagos(),
            ]);
            State.set({ citas, pagos });
            this._renderTab('agenda');
            this._renderTab('dashboard');
          })
          .catch(err => showToast('Error: ' + err.message, 'error'));
      },

      cancelarCitaAdmin(id) {
        if (!confirm('¿Cancelar esta cita?')) return;
        Services.updateCita(id, { estado: 'Cancelada' })
          .then(async () => {
            showToast('Cita cancelada', 'info');
            const citas = await Services.getAllCitas();
            State.set('citas', citas);
            this._renderTab('agenda');
          })
          .catch(err => showToast('Error: ' + err.message, 'error'));
      },

      verCitaAdmin(id) {
        const cita = (State.get('citas') || []).find(c => c.id === id);
        if (!cita) return;
        showToast(
          `📋 ${cita.invoice_number}\nServicio: ${cita.servicio}\nPrecio: ${formatCurrency(cita.precio || 0)}\nEstado: ${cita.estado}\nFecha: ${formatDate(cita.fecha_hora)}`,
          'info', 8000
        );
      },

      guardarClienteAdmin(uid) {
        const nombre = document.getElementById(`ac_n_${uid}`).value.trim();
        if (!nombre) { showToast('El nombre no puede estar vacío', 'error'); return; }
        Services.updateUser(uid, { nombre })
          .then(async () => {
            showToast('Cliente actualizado', 'success');
            const usuarios = await Services.getAllUsers();
            State.set('usuarios', usuarios);
            this._renderTab('clientes');
          })
          .catch(err => showToast('Error: ' + err.message, 'error'));
      },

      eliminarClienteAdmin(uid) {
        if (uid === State.get('userId')) { showToast('No puedes eliminarte a ti mismo', 'error'); return; }
        if (!confirm('¿Eliminar este cliente? Esta acción no se puede deshacer.')) return;
        supabaseClient.from('usuarios').delete().eq('user_id', uid)
          .then(async () => {
            showToast('Cliente eliminado', 'info');
            const usuarios = await Services.getAllUsers();
            State.set('usuarios', usuarios);
            this._renderTab('clientes');
          })
          .catch(err => showToast('Error: ' + err.message, 'error'));
      },

      autorizarFotoAdmin(id) {
        Services.updateFoto(id, { estado: 'autorizada', fecha_autorizacion: new Date().toISOString() })
          .then(async () => {
            showToast('Foto autorizada', 'success');
            const fotos = await Services.getFotos();
            State.set('fotos', fotos);
            this._renderTab('fotos');
          })
          .catch(err => showToast('Error: ' + err.message, 'error'));
      },

      rechazarFotoAdmin(id) {
        if (!confirm('¿Rechazar esta foto?')) return;
        Services.updateFoto(id, { estado: 'rechazada' })
          .then(async () => {
            showToast('Foto rechazada', 'info');
            const fotos = await Services.getFotos();
            State.set('fotos', fotos);
            this._renderTab('fotos');
          })
          .catch(err => showToast('Error: ' + err.message, 'error'));
      },

      eliminarFotoAdmin(id) {
        if (!confirm('¿Eliminar esta foto permanentemente?')) return;
        supabaseClient.from('fotos_mascotas').delete().eq('id', id)
          .then(async () => {
            showToast('Foto eliminada', 'info');
            const fotos = await Services.getFotos();
            State.set('fotos', fotos);
            this._renderTab('fotos');
          })
          .catch(err => showToast('Error: ' + err.message, 'error'));
      },

      ajustarStockAdmin(id) {
        const cantidad = parseInt(prompt('Nuevo stock:'));
        if (isNaN(cantidad) || cantidad < 0) { showToast('Cantidad inválida', 'error'); return; }
        Services.updateProducto(id, { stock_actual: cantidad })
          .then(async () => {
            showToast('Stock actualizado', 'success');
            const productos = await Services.getProductos();
            State.set('productos', productos);
            this._renderTab('inventario');
          })
          .catch(err => showToast('Error: ' + err.message, 'error'));
      },

      eliminarProductoAdmin(id) {
        if (!confirm('¿Eliminar este producto?')) return;
        supabaseClient.from('productos_inventario').delete().eq('id', id)
          .then(async () => {
            showToast('Producto eliminado', 'info');
            const productos = await Services.getProductos();
            State.set('productos', productos);
            this._renderTab('inventario');
          })
          .catch(err => showToast('Error: ' + err.message, 'error'));
      },

      eliminarGastoAdmin(id) {
        if (!confirm('¿Eliminar este gasto?')) return;
        supabaseClient.from('gastos_operativos').delete().eq('id', id)
          .then(async () => {
            showToast('Gasto eliminado', 'info');
            const gastos = await Services.getGastos();
            State.set('gastos', gastos);
            this._renderTab('gastos');
          })
          .catch(err => showToast('Error: ' + err.message, 'error'));
      },

      exportarCSVAdmin() {
        const citas = State.get('citas') || [];
        if (!citas.length) { showToast('No hay datos para exportar', 'warning'); return; }
        let csv = 'Número,Servicio,Precio,Estado,Fecha\n';
        citas.forEach(c => {
          csv +=
            `${c.invoice_number || ''},${c.servicio || ''},${c.precio || 0},${c.estado || ''},${new Date(c.fecha_hora).toLocaleDateString()}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `reporte_${new Date().toISOString().split('T')[0]}.csv`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('Reporte exportado', 'success');
      },

      goToTab(tab) {
        const btn = document.querySelector(`[data-atab="${tab}"]`);
        if (btn) btn.click();
      },
    };

    // ✅ EXPONER MÓDULO DE ADMINISTRACIÓN GLOBALMENTE
    window.AdminModule = AdminModule;

    // ================================================================
    // 10. BOOTSTRAP
    // ================================================================

    async function bootstrap() {
      Logger.info('🚀 Luthor v4.1 iniciando...');

      const hashParams = new URLSearchParams(window.location.hash.substring(1));
      if (hashParams.get('type') === 'recovery') {
        showToast('Ingresa tu nueva contraseña en el formulario', 'info');
      }

      const authed = await AuthModule.init();

      if (authed) {
        Logger.success('✅ Luthor inicializado correctamente');
      } else {
        Logger.info('🔐 Esperando autenticación');
      }

      window.addEventListener('error', (e) => {
        Logger.error('Error no capturado', { message: e.message, stack: e.error?.stack });
        showToast('Error inesperado. Revisa la consola.', 'error');
      });

      window.addEventListener('unhandledrejection', (e) => {
        Logger.error('Promesa rechazada no manejada', e.reason);
        showToast('Error inesperado. Revisa la consola.', 'error');
      });

      Logger.info('✅ Bootstrap completado');
    }

    // ================================================================
    // FUNCIONES GLOBALES (Footer)
    // ================================================================

    function renderFooter(id) {
      const el = document.getElementById(id);
      if (!el) return;
      el.innerHTML = `
        <div class="app-footer">
          <span class="footer-copy">🐩 Luthor v${CONFIG.APP_VERSION} · Estilo y cuidado para tu mejor amigo</span>
          <div class="footer-links">
            <button onclick="window.open('https://wa.me/573142245598','_blank')"><i class="fab fa-whatsapp"></i> WhatsApp</button>
            <button onclick="openModal('supportModal')"><i class="fas fa-headset"></i> Soporte</button>
            <button onclick="openModal('suggestionModal')"><i class="fas fa-comment-alt"></i> Sugerencias</button>
          </div>
        </div>
      `;
    }

    // ================================================================
    // INICIAR APLICACIÓN
    // ================================================================

    document.addEventListener('DOMContentLoaded', bootstrap);
  </script>
</body>
</html>
